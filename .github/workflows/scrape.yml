name: Scrape ISPC Campus

on:
  schedule:
    - cron: "0 10 * * *" # Todos los días a las 10:00 UTC (07:00 ARG)
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Run scraper
        env:
          ISPC_USER: ${{ secrets.ISPC_USER }}
          ISPC_PASSWORD: ${{ secrets.ISPC_PASSWORD }}
          CI: "true"
        run: python scraper/ispc_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ispc_data.json
          git diff --staged --quiet || git commit -m "chore: update ISPC data [$(date '+%Y-%m-%d %H:%M')]"
          git push
